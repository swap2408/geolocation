<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
    input { display: block; margin: 10px 0; padding: 8px; width: 200px; }
    button { padding: 8px 12px;background-color:#5414ca;color: #f4f4f4; }
  </style>
</head>
<body>

<div class="box">
  <h3>Admin Login</h3>
  <form method="POST">
    <input type="text" name="username" placeholder="Username" required />
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
</div>

</body>
</html>
